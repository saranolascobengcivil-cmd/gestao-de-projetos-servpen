# /etc/apache2/conf-available/gestao-de-projetos.conf
# Reverse-proxy de /gestao-de-projetos para Streamlit em 127.0.0.1:8501
# Requer mods: proxy proxy_http proxy_wstunnel rewrite headers

<IfModule mod_proxy.c>
    ProxyPreserveHost On
    ProxyRequests Off

    # Health probe: redireciona /gestao-de-projetos (sem barra) para /gestao-de-projetos/
    RedirectMatch 301 ^/gestao-de-projetos$ /gestao-de-projetos/

    # WebSocket do Streamlit (Tornado): /gestao-de-projetos/_stcore/stream
    # Precisa vir ANTES do ProxyPass HTTP para que upgrade Connection funcione.
    RewriteEngine On
    RewriteCond %{HTTP:Upgrade} =websocket [NC]
    RewriteRule ^/gestao-de-projetos/(.*)$ ws://127.0.0.1:8501/gestao-de-projetos/$1 [P,L]

    # HTTP normal
    ProxyPass        /gestao-de-projetos/ http://127.0.0.1:8501/gestao-de-projetos/ retry=0 timeout=600
    ProxyPassReverse /gestao-de-projetos/ http://127.0.0.1:8501/gestao-de-projetos/

    # Cabeçalhos para o app saber o host/scheme reais
    RequestHeader set X-Forwarded-Proto "http"
    RequestHeader set X-Forwarded-Host "152.92.228.20"
</IfModule>
