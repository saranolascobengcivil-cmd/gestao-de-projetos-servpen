[server]
headless = true
address = "127.0.0.1"
port = 8501
baseUrlPath = "gestao-de-projetos"
# CORS + XSRF on — Apache preserva Host via ProxyPreserveHost.
# Streamlit exige que ambos sejam iguais (true/false); deixar mistos faz ele
# avisar no log e forçar pra true.
enableCORS = true
enableXsrfProtection = true
enableWebsocketCompression = false
maxUploadSize = 100
fileWatcherType = "poll"

[browser]
gatherUsageStats = false
serverAddress = "152.92.238.40"
serverPort = 80

[logger]
level = "info"

[theme]
base = "dark"
