# /etc/apache2/conf-available/gestao-de-projetos.conf
# Proxy reverso de /gestao-de-projetos para o Streamlit em 127.0.0.1:8501.
#
# Requisitos:
#   - Apache >= 2.4.47 (Ubuntu 20.04+ / Debian 11+)
#   - Módulos: proxy, proxy_http, rewrite, headers
#       sudo a2enmod proxy proxy_http rewrite headers
#
# O upgrade=websocket no ProxyPass faz o mod_proxy_http cuidar do upgrade pro
# WebSocket do Streamlit (Tornado) sem precisar de mod_proxy_wstunnel + RewriteRule.
#
# IMPORTANTE: o install.sh substitui __SERVER_IP__ pelo IP real do servidor.

<IfModule mod_proxy.c>
    ProxyPreserveHost On
    ProxyRequests Off

    # /gestao-de-projetos (sem barra) -> /gestao-de-projetos/ (com barra)
    RedirectMatch 301 ^/gestao-de-projetos$ /gestao-de-projetos/

    <Location /gestao-de-projetos/>
        ProxyPass        http://127.0.0.1:8501/gestao-de-projetos/ upgrade=websocket timeout=600 retry=0
        ProxyPassReverse http://127.0.0.1:8501/gestao-de-projetos/

        RequestHeader set X-Forwarded-Proto "http"
        RequestHeader set X-Forwarded-Host  "__SERVER_IP__"
    </Location>
</IfModule>
